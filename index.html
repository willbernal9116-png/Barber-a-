<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>JF Classic Barbería - Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(180deg, #0b0b0b, #1a1a1a); color: #f5f5f5; padding: 20px; }
    .card { max-width: 500px; margin: auto; background: #151515; padding: 24px; border-radius: 14px; box-shadow: 0 0 20px rgba(212,175,55,0.15); border: 1px solid #2a2a2a; }
    .remodelacion-container { width: 100%; text-align: center; margin-bottom: 20px; }
    .remodelacion-img { width: 100%; max-width: 400px; border-radius: 10px; border: 2px solid #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); display: block; margin: 0 auto; }
    h1 { text-align: center; color: #d4af37; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
    p { text-align: center; font-size: 14px; color: #ccc; margin-bottom: 20px; }
    .stars-section { text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid #333; }
    .stars { color: #d4af37; font-size: 20px; margin-bottom: 5px; }
    .stars-text { font-weight: bold; color: #fff; font-size: 16px; }
    label { display: block; margin-top: 14px; font-weight: 600; color: #d4af37; }
    input, select { width: 100%; padding: 11px; margin-top: 6px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #fff; font-size: 15px; box-sizing: border-box; }
    .btn-reservar { width: 100%; padding: 12px; margin-top: 22px; border-radius: 10px; border: none; background: #d4af37; color: #111; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-compartir { width: 100%; padding: 10px; margin-top: 12px; border-radius: 10px; border: 1px solid #d4af37; background: transparent; color: #d4af37; font-size: 14px; font-weight: 600; cursor: pointer; }
    .footer-info { margin-top: 20px; text-align: center; font-size: 12px; color: #666; }
  </style>
</head>
<body>
<div class="card">
  <h1>JF Classic 💈</h1>
  <div class="remodelacion-container">
    <img src="remodelacion.png" alt="Remodelación en proceso" class="remodelacion-img">
  </div>
  <p><strong>Dirección:</strong> Cra 3 #3-60 sur, Barrio Los Andes</p>
  <label>Nombre</label>
  <input id="nombre" placeholder="Escribe tu nombre">
  <label>Servicio</label>
  <select id="servicio">
    <option value="Corte $20.000">Corte $20.000</option>
    <option value="Corte y barba $27.000">Corte y barba $27.000</option>
  </select>
  <label>Día</label>
  <input type="date" id="fecha">
  <label>Hora</label>
  <select id="hora"></select>
  <button class="btn-reservar" onclick="reservar()">Reservar por WhatsApp</button>
  <button class="btn-compartir" onclick="compartirPagina()">📤 Compartir con un amigo</button>
  <div class="stars-section">
    <div class="stars">★★★★★</div>
    <div class="stars-text">¡Súper Recomendado!</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxTFstgphypWGMT-9XY98G1EBs7iHybws",
    authDomain: "jf-classic-barberia.firebaseapp.com",
    projectId: "jf-classic-barberia",
    storageBucket: "jf-classic-barberia.firebasestorage.app",
    messagingSenderId: "1055005410307",
    appId: "1:1055005410307:web:8e3322f05f03a5d458ba36"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const horaSelect = document.getElementById("hora");
  const fechaInput = document.getElementById("fecha");

  const hoy = new Date();
  fechaInput.value = hoy.toISOString().split('T')[0];
  fechaInput.setAttribute('min', fechaInput.value);

  function generarHoras() {
    horaSelect.innerHTML = "";
    const horas = [9.5, 10, 10.5, 11, 11.5, 12, 12.5, 13, 13.5, 15, 15.5, 16, 16.5, 17, 17.5, 18, 18.5, 19, 19.5];
    horas.forEach(t => {
      let h = Math.floor(t);
      let m = t % 1 === 0 ? "00" : "30";
      let ampm = h >= 12 ? "PM" : "AM";
      let h12 = h > 12 ? h - 12 : h;
      if (h12 === 0) h12 = 12;
      let texto = `${h12}:${m} ${ampm}`;
      let option = document.createElement("option");
      option.value = texto;
      option.textContent = texto;
      horaSelect.appendChild(option);
    });
  }

  async function cargarHorasOcupadas() {
    const fecha = fechaInput.value;
    generarHoras();
    try {
      const q = query(collection(db, "citas"), where("fecha", "==", fecha));
      const snapshot = await getDocs(q);
      const ocupadas = snapshot.docs.map(d => d.data().hora);
      Array.from(horaSelect.options).forEach(opt => {
        if (ocupadas.includes(opt.value)) {
          opt.disabled = true;
          opt.textContent += " (Ocupado)";
        }
      });
    } catch (e) { console.error("Error al cargar:", e); }
  }

  // Ejecución inmediata
  cargarHorasOcupadas();
  fechaInput.addEventListener("change", cargarHorasOcupadas);

  window.reservar = async function() {
    const nombre = document.getElementById("nombre").value;
    const servicio = document.getElementById("servicio").value;
    const fecha = fechaInput.value;
    const hora = horaSelect.value;
    if (!nombre) { alert("Pon tu nombre"); return; }
    await addDoc(collection(db, "citas"), { nombre, servicio, fecha, hora });
    window.open(`https://wa.me/573008612063?text=Hola, soy ${nombre}. Cita: ${fecha} a las ${hora}.`, "_blank");
    cargarHorasOcupadas();
  };

  window.compartirPagina = () => window.open(`https://wa.me/?text=Agenda en JF Classic: ${window.location.href}`, "_blank");
</script>
</body>
</html>
