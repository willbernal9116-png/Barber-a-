<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>JF Classic Barbería - Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; color: #f5f5f5; padding: 20px; }
    .card { max-width: 500px; margin: auto; background: #151515; padding: 24px; border-radius: 14px; border: 1px solid #2a2a2a; }
    .remodelacion-img { width: 100%; max-width: 400px; border-radius: 10px; border: 2px solid #d4af37; display: block; margin: 0 auto 20px; }
    h1 { text-align: center; color: #d4af37; }
    label { display: block; margin-top: 14px; color: #d4af37; font-weight: bold; }
    input, select { width: 100%; padding: 11px; margin-top: 6px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #fff; box-sizing: border-box; }
    .btn-reservar { width: 100%; padding: 12px; margin-top: 22px; border-radius: 10px; border: none; background: #d4af37; color: #111; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
<div class="card">
  <h1>JF Classic 💈</h1>
  <img src="remodelacion.png" alt="Remodelación" class="remodelacion-img">
  <label>Nombre</label>
  <input id="nombre" placeholder="Tu nombre">
  <label>Servicio</label>
  <select id="servicio">
    <option value="Corte $20.000">Corte $20.000</option>
    <option value="Corte y barba $27.000">Corte y barba $27.000</option>
  </select>
  <label>Día</label>
  <input type="date" id="fecha">
  <label>Hora</label>
  <select id="hora"></select>
  <button class="btn-reservar" onclick="reservar()">Reservar</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxTFstgphypWGMT-9XY98G1EBs7iHybws",
    authDomain: "jf-classic-barberia.firebaseapp.com",
    projectId: "jf-classic-barberia",
    storageBucket: "jf-classic-barberia.firebasestorage.app",
    messagingSenderId: "1055005410307",
    appId: "1:1055005410307:web:8e3322f05f03a5d458ba36"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const horaSelect = document.getElementById("hora");
  const fechaInput = document.getElementById("fecha");

  // Fecha de hoy por defecto
  const hoy = new Date().toISOString().split('T')[0];
  fechaInput.value = hoy;
  fechaInput.setAttribute('min', hoy);

  function generarHoras() {
    horaSelect.innerHTML = "";
    const horas = ["9:30 AM", "10:00 AM", "10:30 AM", "11:00 AM", "11:30 AM", "12:00 PM", "12:30 PM", "1:00 PM", "1:30 PM", "3:00 PM", "3:30 PM", "4:00 PM", "4:30 PM", "5:00 PM", "5:30 PM", "6:00 PM", "6:30 PM", "7:00 PM", "7:30 PM"];
    horas.forEach(h => {
      let opt = document.createElement("option");
      opt.value = h; opt.textContent = h;
      horaSelect.appendChild(opt);
    });
  }

  async function cargar() {
    generarHoras();
    try {
      const q = query(collection(db, "citas"), where("fecha", "==", fechaInput.value));
      const snap = await getDocs(q);
      const ocupadas = snap.docs.map(d => d.data().hora);
      
      // ESTO NOS DIRÁ SI HAY CITAS
      if(ocupadas.length > 0) {
        console.log("Citas encontradas:", ocupadas);
      }

      Array.from(horaSelect.options).forEach(opt => {
        if (ocupadas.includes(opt.value)) {
          opt.disabled = true;
          opt.textContent += " (Ocupado)";
        }
      });
    } catch (err) {
      alert("Error de conexión: " + err.message);
    }
  }

  cargar();
  fechaInput.addEventListener("change", cargar);

  window.reservar = async function() {
    const nombre = document.getElementById("nombre").value;
    if (!nombre) return alert("Escribe tu nombre");
    await addDoc(collection(db, "citas"), { 
      nombre, 
      servicio: document.getElementById("servicio").value, 
      fecha: fechaInput.value, 
      hora: horaSelect.value 
    });
    alert("Reserva guardada");
    cargar();
  }
</script>
</body>
</html>
